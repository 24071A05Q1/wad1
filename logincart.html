<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftShop Bootstrap</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f8f9fa; }
.page { display: none; min-height: 80vh; }
.active { display: block; }
.product-emoji { font-size: 4rem; text-align: center; padding: 20px; background: #eee; }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container">
<a class="navbar-brand fw-bold text-info" href="#" onclick="showPage('catalog')">SwiftShop</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#" onclick="showPage('catalog')">Catalog</a></li>

<li class="nav-item">
<a class="nav-link" href="#" onclick="showPage('cart')">
Cart <span id="cart-count" class="badge bg-info text-dark">0</span>
</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-outline-info ms-lg-2" href="#" onclick="showPage('login')">Login</a>
</li>
</ul>
</div>
</div>
</nav>

<main class="container my-5">

<!-- REGISTER -->
<section id="register" class="page">
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card shadow border-0">
<div class="card-body p-5">
<h2 class="text-center mb-4">Register</h2>

<form onsubmit="registerUser(event)">
<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" required>
</div>

<button class="btn btn-info w-100 mt-3">Sign Up</button>
</form>

</div>
</div>
</div>
</div>
</section>

<!-- LOGIN -->
<section id="login" class="page">
<div class="row justify-content-center">
<div class="col-md-4">
<div class="card shadow border-0">
<div class="card-body p-5">
<h2 class="text-center mb-4">Login</h2>

<form onsubmit="loginUser(event)">
<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" required>
</div>

<button class="btn btn-primary w-100">Login</button>

<p class="text-center mt-3 small">
Need an account?
<a href="#" onclick="showPage('register')">Register</a>
</p>
</form>

</div>
</div>
</div>
</div>
</section>

<!-- CATALOG -->
<section id="catalog" class="page active">
<h2 class="mb-4">Product Catalog</h2>
<div class="row g-4" id="product-list"></div>
</section>

<!-- CART -->
<section id="cart" class="page">
<h2 class="mb-4">Your Cart</h2>

<div class="card">
<table class="table">
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>
<tbody id="cart-items"></tbody>
</table>

<div id="cart-empty" class="text-center p-4">
Cart is empty
</div>

<div class="p-3">
Total: $<span id="cart-total">0</span>
<button class="btn btn-success float-end" onclick="alert('Order placed!')">Order</button>
</div>
</div>
</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ---------------- USERS (with storage) ---------------- */
let users = JSON.parse(localStorage.getItem("users")) || [];

/* ---------------- PRODUCTS ---------------- */
const products = [
{ id: 1, name: "Headphones", price: 150, img: "🎧" },
{ id: 2, name: "Smartwatch", price: 210, img: "⌚" },
{ id: 3, name: "Keyboard", price: 85, img: "⌨️" },
{ id: 4, name: "Mouse", price: 45, img: "🖱️" }
];

let cart = [];

/* ---------------- PAGE SWITCH ---------------- */
function showPage(pageId) {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById(pageId).classList.add('active');
}

/* ---------------- REGISTER ---------------- */
function registerUser(e) {
e.preventDefault();

const name = e.target[0].value;
const email = e.target[1].value;
const password = e.target[2].value;

// check existing
if (users.find(u => u.email === email)) {
alert("User already exists!");
return;
}

users.push({ name, email, password });

// save
localStorage.setItem("users", JSON.stringify(users));

alert("Registered successfully!");
showPage('login');
}

/* ---------------- LOGIN ---------------- */
function loginUser(e) {
e.preventDefault();

const email = e.target[0].value;
const password = e.target[1].value;

const user = users.find(u => u.email === email && u.password === password);

if (user) {
alert("Login successful!");
showPage('catalog');
} else {
alert("Invalid email or password!");
}
}

/* ---------------- CATALOG ---------------- */
function renderCatalog() {
const list = document.getElementById('product-list');

list.innerHTML = products.map(p => `
<div class="col-md-3">
<div class="card text-center">
<div class="product-emoji">${p.img}</div>
<div class="card-body">
<h6>${p.name}</h6>
<p>$${p.price}</p>
<button class="btn btn-info btn-sm" onclick="addToCart(${p.id})">Add</button>
</div>
</div>
</div>
`).join('');
}

/* ---------------- CART ---------------- */
function addToCart(id) {
cart.push(products.find(p => p.id === id));
updateCart();
}

function updateCart() {
document.getElementById("cart-count").innerText = cart.length;

let total = 0;

document.getElementById("cart-items").innerHTML = cart.map((item, i) => {
total += item.price;
return `
<tr>
<td>${item.name}</td>
<td>$${item.price}</td>
<td><button onclick="removeItem(${i})">Remove</button></td>
</tr>
`;
}).join('');

document.getElementById("cart-total").innerText = total;
}

function removeItem(i) {
cart.splice(i, 1);
updateCart();
}

/* ---------------- INIT ---------------- */
renderCatalog();

</script>

</body>
</html>
